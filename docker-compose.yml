services:
  # ── FastAPI Application ──────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: metadata-api
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - metadata-network

  # ── MongoDB ──────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: metadata-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - metadata-network

networks:
  metadata-network:
    driver: bridge

volumes:
  mongodb_data:
